  <text x="142" y="790" fill="#1D1813" font-family="Arial, sans-serif" font-size="16" font-weight="700">1. Pause non-essential spending in Food for the next 7 days.</text>
  <text x="142" y="826" fill="#1D1813" font-family="Arial, sans-serif" font-size="16" font-weight="700">2. Review recurring payments and convert missing ones into real entries.</text>
  <text x="142" y="862" fill="#1D1813" font-family="Arial, sans-serif" font-size="16" font-weight="700">3. Protect at least €280 for the active savings goal.</text>
