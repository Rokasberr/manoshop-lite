services:
  - type: web
    name: manoshop-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - server/**
        - database/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: COMPANY_NAME
        value: Mano Atelier
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
